name: Perform Mixeway Scan
on: [push]

jobs:
  mixeway-scan:
    name: Mixeway Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      
      - name: Prepare variables
        id: vars
        shell: bash
        run: |
          echo "::set-output name=branch::$(echo ${GITHUB_REF#refs/heads/})"
          echo "::set-output name=sha_short::$(git rev-parse HEAD)"
          
      - name: Prepare Mixeway docker image
        run: |
          docker pull mixeway/scanner:latest
          
      - name: Run Scan
        run: |
          docker run \
          -e OSS_USERNAME=aleksandr.rogaczewski@gmail.com \
          -e OSS_KEY=sonatype_pat_JO8DCa3BjY8R8ZJ45J10cQWcQGTnNlKJy8Q50m9KGLUFdo5v \
          -e MIXEWAY_URL=https://hub.mixeway.io \
          -e MIXEWAY_KEY=23e0b315-0278-4a96-90a9-a680f02e09fd \
          -e MIXEWAY_PROJECT_ID=199 \
          -e MODE=STANDALONE \
          -e MIXEWAY_PROJECT_NAME=Aleksandrpl_lab_secure_app \
          -e COMMIT_ID=${{ steps.vars.outputs.sha_short }} \
          -e BRANCH=${{ steps.vars.outputs.branch }} \
          -v ${{ github.workspace }}:/opt/sources \
          mixeway/scanner:latest
